<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>

        body{
            margin:0;
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login{
            width:350px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
        }

        h1{
            color:white;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#ff511c;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <form
        class="login"
        method="POST"
        action="/login">

        <h1>
            Admin Login
        </h1>

        <input
            type="text"
            name="username"
            placeholder="Username">

        <input
            type="password"
            name="password"
            placeholder="Password">

        <button>
            Giriş Yap
        </button>

    </form>

</body>

</html>
